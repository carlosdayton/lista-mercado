<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lista do Mercado</title>
  <meta name="description" content="Sua lista de compras pessoal" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Overlay de Autenticação -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 24px;">
        <h1 style="font-size: 24px; color: var(--blue);">🛒</h1>
        <h2 id="auth-titulo" style="font-size: 20px; font-weight: 600; color: var(--text); margin-top: 8px;">Bem-vindo</h2>
        <p id="auth-sub" style="font-size: 14px; color: var(--text-muted); margin-top: 4px;">Entre na sua conta para acessar suas listas sincronizadas.</p>
      </div>

      <form id="form-auth" autocomplete="off">
        <input type="email" id="auth-email" placeholder="Seu e-mail" required />
        <input type="password" id="auth-senha" placeholder="Sua senha secreta" required minlength="6" />
        <button type="submit" id="btn-auth-submit" class="auth-btn">Entrar</button>
      </form>

      <div class="auth-footer">
        <span id="auth-toggle-texto">Ainda não tem conta?</span>
        <button id="btn-auth-toggle" class="auth-toggle-btn">Criar conta</button>
      </div>
    </div>
  </div>

  <div class="app">

    <header class="header">
      <div class="header-top">
        <h1>🛒 Lista do Mercado</h1>
        <div class="header-acoes">
          <button id="btn-salvar-modelo" class="btn-acao" title="Salvar lista">Salvar modelo</button>
          <button id="btn-modelos" class="btn-acao" title="Modelos">Modelos</button>
          <button id="btn-compartilhar" class="btn-acao">Compartilhar</button>
          <button id="btn-limpar-comprados" class="btn-acao">Remover comprados</button>
          <button id="btn-limpar-tudo" class="btn-acao danger">Limpar tudo</button>
          <button id="btn-modo-compras" class="btn-acao btn-modo-compras-toggle">🛒 Modo Compras</button>
          <button id="btn-logout" class="btn-acao danger" title="Desconectar da conta">Sair</button>
        </div>
      </div>
      <div id="resumo" class="resumo"></div>
    </header>

    <div id="lista" class="lista"></div>

  </div>

  <!-- Botão para sair do modo compras — visível só no modo compras -->
  <button id="btn-sair-modo" class="btn-sair-modo">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Sair do modo compras
  </button>

  <!-- Formulário flutuante -->
  <div class="form-wrapper">
    <div class="form-inner">

      <button class="fab" id="fab">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="9" y1="2" x2="9" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="2" y1="9" x2="16" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Adicionar item
      </button>

      <form id="form-adicionar" class="form" autocomplete="off">
        <div class="form-header">
          <span class="form-titulo">Novo item</span>
          <button type="button" class="btn-fechar" id="btn-fechar">✕</button>
        </div>

        <div class="input-grupo">
          <input id="input-nome" type="text" placeholder="O que precisa comprar?" required autocomplete="off" />
          <div id="sugestoes" class="sugestoes" style="display:none"></div>
        </div>

        <div class="form-linha2">
          <select id="select-categoria"></select>
          <input id="input-qtd" type="number" value="1" min="1" step="1" />
          <select id="select-unidade">
            <option value="un">un</option>
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="L">L</option>
            <option value="ml">ml</option>
            <option value="cx">cx</option>
            <option value="pct">pct</option>
            <option value="dz">dz</option>
          </select>
          <button type="submit" class="btn-adicionar">Adicionar</button>
        </div>

        <input id="input-nota" type="text" placeholder="Observação (opcional) — marca, tamanho..." autocomplete="off" />
      </form>

    </div>
  </div>

  <script src="dist/main.js"></script>
</body>
</html>
